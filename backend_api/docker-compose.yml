version: '3.8'

networks:
  backend-net:
    driver: bridge

services:
  # --------------------------------------------------------------------------
  #  Core Infrastructure Services
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    networks:
      - backend-net
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - backend-net
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    env_file:
      - .env

  # --------------------------------------------------------------------------
  #  API Gateway Service
  # --------------------------------------------------------------------------
  gateway:
    build:
      context: ./gateway_service
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "8000:8000"
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=json
      - OPERATIONAL_DB_URL=postgresql://phantomnet:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - POLICY_DB_URL=postgresql://phantomnet:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY=${JWT_SECRET_KEY}
    healthcheck:
      test: ["CMD", "curl", "-v", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    env_file:
      - .env

  # --------------------------------------------------------------------------
  #  Microservices Grid
  # --------------------------------------------------------------------------
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    container_name: analyzer-service
    networks:
      - backend-net
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  asset_inventory:
    build:
      context: ./asset_inventory
      dockerfile: Dockerfile
    container_name: asset-inventory-service
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    env_file:
      - .env

  compliance_reporting:
    build:
      context: ./compliance_reporting_service
      dockerfile: Dockerfile
    container_name: compliance-reporting-service
    networks:
      - backend-net
    environment:
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    env_file:
      - .env

  case_management:
    build:
      context: ./case_management_service
      dockerfile: Dockerfile
    container_name: case-management-service
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    env_file:
      - .env

  threat_intelligence:
    build:
      context: ./threat_intelligence_service
      dockerfile: Dockerfile
    container_name: threat-intelligence-service
    networks:
      - backend-net
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
