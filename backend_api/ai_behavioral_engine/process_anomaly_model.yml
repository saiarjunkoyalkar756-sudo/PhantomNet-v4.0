model:
  name: process_behavior_anomaly_detection
  type: IsolationForest
  version: 1.0.0

features:
  - name: process_path_frequency
    source: agent_telemetry
    description: Frequency of the process path on the host.
  - name: parent_process_path_frequency
    source: agent_telemetry
    description: Frequency of the parent process path.
  - name: command_line_length
    source: agent_telemetry
    description: Length of the process command line.
  - name: command_line_entropy
    source: agent_telemetry
    description: Shannon entropy of the command line arguments.
  - name: network_connections_count
    source: agent_telemetry
    description: Number of outbound network connections in the first 5 seconds.
  - name: file_modifications_count
    source: agent_telemetry
    description: Number of files modified in the first 5 seconds.

training_parameters:
  contamination: 0.01 # Expected percentage of anomalies in the training data
  max_samples: 256
  n_estimators: 100

deployment:
  platform: agent
  mode: real-time # Run inference in real-time on the agent
  update_frequency_hours: 24 # How often to check for a new model from the backend
