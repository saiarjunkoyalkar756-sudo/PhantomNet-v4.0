id: credential_brute_force
description: >
  MITRE ATT&CK T1110 – Brute Force: Emulates a credential stuffing attack against
  a target SSH or RDP service using a constrained request rate to stay below detection
  thresholds. Designed for controlled BAS environments only.
type: credential_attack

target:
  service: ssh
  port: 22
  endpoint: null

parameters:
  username_list:
    - admin
    - root
    - ubuntu
    - phantomnet
  password_list:
    - password123
    - admin
    - changeme
    - P@ssw0rd
  max_attempts_per_min: 10

safety:
  destructive: false
  sandbox_required: true
  allow_payloads: false

mitre:
  tactic: Credential Access
  technique: T1110
  sub_technique: T1110.001

expected_detection:
  - alert_type: BruteForceAttempt
    source: auth.log
    threshold: 5 failed attempts in 60 seconds
