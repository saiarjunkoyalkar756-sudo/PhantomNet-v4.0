name: CI — PhantomNet

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Python backend + agent tests with coverage
  # ──────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend & Agent Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run backend tests with coverage
        run: |
          pytest tests/ backend_api/tests/ \
            --cov=backend_api \
            --cov=phantomnet_agent \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v \
            --tb=short \
            || true  # Don't fail CI on test failures yet (coverage enforcement coming)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: backend
          name: backend-coverage-py${{ matrix.python-version }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Dependency vulnerability scanning
  # ──────────────────────────────────────────────────────────────────────────
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: |
          pip-audit -r requirements.txt --desc on \
            --ignore-vuln PYSEC-2022-42969 \
            || echo "::warning::pip-audit found vulnerabilities — review above"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: dashboard_frontend/package-lock.json

      - name: Audit frontend dependencies
        working-directory: dashboard_frontend
        run: |
          npm ci --prefer-offline
          npm audit --audit-level=high \
            || echo "::warning::npm audit found high-severity vulnerabilities"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Frontend build check
  # ──────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: dashboard_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: dashboard_frontend
        run: npm ci --prefer-offline

      - name: Build frontend
        working-directory: dashboard_frontend
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Agent playbook loader smoke test
  # ──────────────────────────────────────────────────────────────────────────
  playbook-smoke-test:
    name: Red Team Playbook Loader
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pydantic pyyaml

      - name: Verify all playbooks load cleanly
        run: |
          python - <<'EOF'
          import os, yaml, sys
          playbook_dir = "phantomnet_agent/red_teaming/playbooks"
          required_fields = {"id", "description", "type", "target", "parameters", "safety", "mitre"}
          errors = []
          for fname in os.listdir(playbook_dir):
              if not fname.endswith(".yaml"):
                  continue
              fpath = os.path.join(playbook_dir, fname)
              with open(fpath) as f:
                  data = yaml.safe_load(f)
              missing = required_fields - set(data.keys())
              if missing:
                  errors.append(f"{fname}: missing fields {missing}")
              else:
                  print(f"  ✓ {fname}")
          if errors:
              print("\nFAILURES:", file=sys.stderr)
              for e in errors:
                  print(f"  ✗ {e}", file=sys.stderr)
              sys.exit(1)
          print(f"\nAll {len(os.listdir(playbook_dir))} playbooks valid.")
          EOF
